appId: com.mshomepros.mhpestimate
productName: MHP Estimate
directories:
  buildResources: build
  output: release
files:
  - out/**/*

# Auto-update: publish to GitHub Releases
# Set GH_TOKEN env var to enable auto-update publishing
publish:
  provider: github
  owner: mshomepros
  repo: proestimate
  releaseType: release

win:
  target:
    - nsis
  icon: build/icon.png
  signingHashAlgorithms:
    - sha256
  # Set CSC_LINK + CSC_KEY_PASSWORD env vars for Windows code signing
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true

mac:
  target:
    - dmg
    - zip
  icon: build/icon.icns
  category: public.app-category.business
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarization — requires APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID env vars
  notarize: true
  # Code signing — uses identity from keychain automatically
  # Set CSC_LINK + CSC_KEY_PASSWORD for CI builds
  protocols:
    - name: MHP Estimate
      schemes:
        - proestimate
        - mhpestimate
dmg:
  sign: false

linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
  category: Office
deb:
  depends:
    - gconf2
    - gconf-service
    - libnotify4
    - libappindicator1
    - libxtst6
    - libnss3
