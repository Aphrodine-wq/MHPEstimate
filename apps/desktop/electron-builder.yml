appId: com.mshomepros.proestimate
productName: ProEstimate AI
directories:
  buildResources: build
  output: release
files:
  - dist/**/*
win:
  target:
    - nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
mac:
  target:
    - dmg
  icon: build/icon.icns
  category: public.app-category.business
